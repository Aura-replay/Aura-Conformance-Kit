name: Aura TCK CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff Format
        run: ruff format --check .

      - name: Ruff Lint
        run: ruff check .

      - name: Mypy
        run: mypy --strict reference/python/

      - name: Unit Tests
        run: pytest -q

      - name: Smoke Test CLI
        run: |
          python -m aura_conformance run

      - name: Verify certificate.json
        run: |
          test -f certificate.json
          python -c "import json; json.load(open('certificate.json'))"
